name: Store-Front CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'store-front-L8/**'
      - '.github/workflows/store-front.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push store-front image
        uses: docker/build-push-action@v7
        with:
          context: ./store-front-L8
          push: true
          tags: |
            ilyaszazai/store-front:latest
            ilyaszazai/store-front:${{ github.sha }}

      - name: Setup kubectl
        uses: Azure/setup-kubectl@v4

      - name: Set AKS context from kubeconfig
        uses: Azure/k8s-set-context@v5
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Update deployment image
        run: |
          kubectl set image deployment/store-front store-front=ilyaszazai/store-front:${{ github.sha }}
          kubectl rollout status deployment/store-front --timeout=180s

      - name: Verify service and pods
        run: |
          kubectl get pods
          kubectl get svc